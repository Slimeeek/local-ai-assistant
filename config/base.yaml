# Основной конфиг ассистента
assistant:
  name: "LocalAI"
  version: "0.2.0"

# Настройки LLM
llm:
  backend: "ollama"
  model: "t-tech/t-lite-it-2.1:q4_k_m"  # Или любая другая, которая у вас есть
  temperature: 0.7
  max_tokens: 2048

# Настройки памяти (пока отключена)
memory:
  enabled: true
  vector_db_path: "data/chromadb"
  top_k_memories: 3

# Профиль производительности
profile: "balanced"

# Модули (все отключены для начала)
modules:
  vision: false
  actions: false
  voice: false
