# Основной конфиг ассистента
assistant:
  name: "LocalAI"
  version: "0.1.0"

# Настройки LLM
llm:
  backend: "ollama"
  model: "qwen2.5:7b"  # Или любая другая, которая у вас есть
  temperature: 0.7
  max_tokens: 2048

# Настройки памяти (пока отключена)
memory:
  enabled: false
  vector_db_path: "data/chromadb"

# Профиль производительности
profile: "balanced"

# Модули (все отключены для начала)
modules:
  vision: false
  actions: false
  voice: false
